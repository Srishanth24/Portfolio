<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Distributed Resource Scheduling System</title>
  <desc id="desc">Simple project thumbnail for a distributed resource scheduler.</desc>
  <defs>
