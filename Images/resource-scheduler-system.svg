      <stop offset="0" stop-color="#26358b"/>
      <stop offset="1" stop-color="#10142d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <circle cx="1025" cy="80" r="190" fill="#ffffff" opacity="0.08"/>

  <g transform="translate(72 84)">
