    <rect x="0" y="0" width="116" height="92" rx="24" fill="#80f7c8" opacity="0.18" stroke="#80f7c8" stroke-width="4"/>
    <rect x="202" y="0" width="116" height="92" rx="24" fill="#ffffff" opacity="0.12" stroke="#ffffff" stroke-width="3"/>
